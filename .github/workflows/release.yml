name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: chinmina/.github/.github/workflows/goreleaser-release.yml@verified-actions
    with:
      token-source: octo-sts
      sts-scope: jamestelfer
      disable-binstaller: false
      disable-homebrew: false
      disable-npm: false
      npm-package-name: "@jamestelfer/imds-broker"
    secrets: inherit
