# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: release
    binary: imds-broker
    main: ./cmd/imds-broker
    flags:
      - "-trimpath"
    ldflags: "-w -X main.version={{.Version}}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

checksum:
  name_template: "checksums.txt"

archives:
  - id: archives
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  use: github-native
  sort: asc

release:
  prerelease: auto
